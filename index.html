<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJM Control Panel - Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0a0e17;
            --bg-card: #111827;
            --input-bg: #0d121f;
            --text-main: #ffffff;
            --text-dim: #6b7280;
            --logo-cyan: #06b6d4;
            --login-grad: linear-gradient(90deg, #813df5 0%, #c03df5 100%);
            --chat-purple: #4f46e5;
            --modal-bg: rgba(17, 24, 39, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- LOADING SCREEN (HIDDEN BY DEFAULT) --- */
        #loadingScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(6, 182, 212, 0.1);
            border-left-color: var(--logo-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- UI LOGIN CARD --- */
        .login-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 390px;
            padding: 55px 35px 45px;
            border-radius: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card.hide { opacity: 0; transform: scale(0.8); pointer-events: none; }
        .login-card.blur { filter: blur(8px); transform: scale(0.95); pointer-events: none; }

        .logo-box {
            background: var(--logo-cyan);
            width: 85px; height: 85px; margin: 0 auto 30px;
            border-radius: 22px; display: flex; justify-content: center;
            align-items: center; font-size: 42px; color: white;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        h1 { font-size: 26px; letter-spacing: 2.5px; margin-bottom: 8px; font-weight: 700; color: #fff; }
        .gateway-text {
            font-size: 11px; color: var(--text-dim); letter-spacing: 3.5px;
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; margin-bottom: 50px; font-weight: 500;
        }
        .gateway-text::before, .gateway-text::after { content: ""; height: 1px; width: 25px; background: var(--text-dim); margin: 0 15px; opacity: 0.2; }

        .input-group { text-align: left; margin-bottom: 28px; }
        .input-group label { font-size: 11px; color: var(--text-dim); font-weight: 700; margin-bottom: 12px; display: block; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%; background: var(--input-bg); border: none;
            padding: 20px; border-radius: 20px; color: white;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.5); outline: none; font-size: 15px;
        }
        .input-wrapper i { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); color: #374151; font-size: 16px; }

        .login-btn {
            width: 100%; background: var(--login-grad); border: none;
            padding: 20px; border-radius: 22px; color: white;
            font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 12px 25px rgba(129, 61, 245, 0.4); margin-top: 10px;
        }

        /* --- MODAL SUPPORT --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 100; backdrop-filter: blur(4px);
        }

        .chat-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 380px; height: 550px;
            background: var(--modal-bg); border-radius: 40px;
            display: none; flex-direction: column; z-index: 101;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }
        .chat-modal.active { display: flex; transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .chat-header {
            padding: 25px; display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.01);
        }
        .dev-profile { width: 48px; height: 48px; background: rgba(6, 182, 212, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(6, 182, 212, 0.3); color: var(--logo-cyan); margin-right: 15px; }
        .header-text h4 { font-size: 14px; letter-spacing: 1.5px; font-weight: 700; color: white; }
        .status { font-size: 10px; color: var(--text-dim); display: flex; align-items: center; margin-top: 5px; font-weight: 600; }
        .dot { width: 7px; height: 7px; background: #10b981; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px #10b981; }

        .chat-footer { padding: 30px 20px; }
        .input-box { background: rgba(255,255,255,0.03); border-radius: 22px; padding: 12px 12px 12px 22px; display: flex; align-items: center; box-shadow: inset 2px 2px 8px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.02); }
        .input-box input { background: transparent; border: none; outline: none; color: white; flex: 1; font-size: 14px; }
        .send-btn { background: var(--chat-purple); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }

        .chat-trigger {
            position: fixed; bottom: 30px; right: 30px;
            background: #1e293b; width: 68px; height: 68px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <h2 style="letter-spacing: 2px;">MENGHUBUNGKAN KE SERVER...</h2>
        <p style="color: var(--text-dim); font-size: 12px; margin-top: 10px;">Enkripsi Sesi Sedang Berjalan</p>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo-box"><i class="fas fa-shield-alt"></i></div>
        <h1>AJM CONTROL PANEL</h1>
        <div class="gateway-text">Authentication Gateway</div>

        <form id="loginForm">
            <div class="input-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <input type="text" id="user" placeholder="Username" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="********" required>
                    <i class="fas fa-eye" id="togglePass" style="cursor:pointer"></i>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">MASUK SEKARANG</button>
        </form>

        <div style="margin-top:45px; font-size:10px; color:#4b5563; letter-spacing:2px; font-weight:700;">
            SECURITY POWERED<br>
            <span style="opacity:0.4; font-weight:400;">AJM SYSTEM v2.0 - SECURE ENCRYPTED ACCESS</span>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="chat-modal" id="chatModal">
        <div class="chat-header">
            <div class="dev-profile"><i class="fas fa-user"></i></div>
            <div class="header-text">
                <h4>SUPPORT</h4>
                <div class="status"><div class="dot"></div> LIVE CHAT</div>
            </div>
            <i class="fas fa-times" id="closeModal" style="margin-left:auto; cursor:pointer;"></i>
        </div>
        <div class="chat-footer">
            <div class="input-box">
                <input type="text" placeholder="Tulis pesan..." id="msgInput">
                <div class="send-btn" onclick="sendToTelegram()"><i class="fas fa-paper-plane"></i></div>
            </div>
        </div>
    </div>

    <div class="chat-trigger" id="chatTrigger">
        <i class="fas fa-comment-dots" style="font-size: 28px; color: white;"></i>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ================= FIREBASE CONFIG =================
const firebaseConfig = { 
  apiKey: "AIzaSyBSRUZheiN6UQshTHyKvZN0PLZ-pYyF3JE",
  authDomain: "pengunjung-dbc40.firebaseapp.com",
  databaseURL: "https://pengunjung-dbc40-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pengunjung-dbc40",
  storageBucket: "pengunjung-dbc40.firebasestorage.app",
  messagingSenderId: "176191314530",
  appId: "1:176191314530:web:c3421dfc8c1434aaba0f3b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ================= ELEMENT =================
const loginForm = document.getElementById('loginForm');
const loginCard = document.getElementById('loginCard');
const loadingScreen = document.getElementById('loadingScreen');
const loginBtn = document.getElementById('loginBtn');

// ================= LOGIN =================
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('user').value.trim();
    const password = document.getElementById('pass').value;

    if (!username || !password) {
        alert("Harap isi semua field!");
        return;
    }

    const email = `${username}@ajm.internal`;

    loginBtn.innerText = "MENGECEK...";
    loginBtn.disabled = true;

    try {
        await signInWithEmailAndPassword(auth, email, password);

        // SUCCESS LOGIN
        loginCard.classList.add('hide');

        setTimeout(() => {
            loginCard.style.display = 'none';
            loadingScreen.style.display = 'flex';
            startHiddenCountdown(60);
        }, 600);

    } catch (error) {
        console.error(error);
        alert("Akses Ditolak: Username atau Password Salah!");
        loginBtn.innerText = "MASUK SEKARANG";
        loginBtn.disabled = false;
    }
});

// ================= COUNTDOWN =================
function startHiddenCountdown(minutes) {
    let seconds = minutes * 60;

    console.log(`Sesi dimulai: ${minutes} menit`);

    const timer = setInterval(() => {
        seconds--;

        if (seconds <= 0) {
            clearInterval(timer);
            alert("Sesi Anda telah berakhir.");
            location.reload();
        }

    }, 1000);
}
</script>

<script>
// ================= UI INTERACTION =================
const modal = document.getElementById('chatModal');
const trigger = document.getElementById('chatTrigger');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closeModal');

// TOGGLE CHAT
function toggleChat() {
    const isHidden = !modal.classList.contains('active');

    if (isHidden) {
        modal.style.display = 'flex';
        overlay.style.display = 'block';

        setTimeout(() => {
            modal.classList.add('active');
        }, 10);

    } else {
        modal.classList.remove('active');

        setTimeout(() => {
            modal.style.display = 'none';
            overlay.style.display = 'none';
        }, 300);
    }
}

// EVENT LISTENER
trigger.addEventListener('click', toggleChat);
closeBtn.addEventListener('click', toggleChat);
overlay.addEventListener('click', toggleChat);

// ================= TOGGLE PASSWORD =================
document.getElementById('togglePass').addEventListener('click', function() {
    const input = document.getElementById('pass');

    if (input.type === 'password') {
        input.type = 'text';
        this.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        this.classList.remove('fa-eye-slash');
    }
});

// ================= TELEGRAM SEND =================
function sendToTelegram() {
    const msg = document.getElementById('msgInput').value.trim();

    if (!msg) {
        alert("Pesan tidak boleh kosong!");
        return;
    }

    const username = "Faridrizki56"; // GANTI USERNAME TELEGRAM
    const url = `https://t.me/${username}?text=${encodeURIComponent(msg)}`;

    window.open(url, '_blank');
}
</script>
</body>
</html>
