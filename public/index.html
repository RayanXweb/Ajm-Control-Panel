<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJM Control Panel</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0b1623, #020617);
      color: #fff;
    }

    .container {
      width: 360px;
      padding: 25px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 10px auto;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 25px rgba(14,165,233,0.5);
    }

    h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-top: 15px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin: 10px 0 25px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      display: block;
    }

    .input-box {
      display: flex;
      align-items: center;
      background: #1e293b;
      border-radius: 14px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 14px;
    }

    .input-box span {
      color: #64748b;
      margin-right: 8px;
    }

    .eye {
      cursor: pointer;
      color: #64748b;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #06b6d4, #0ea5e9);
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      box-shadow: 0 0 20px rgba(14,165,233,0.6);
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon">🔒</div>

  <h1>AJM CONTROL PANEL</h1>
  <div class="subtitle">silakan login untuk melihat fitur</div>

  <div class="input-group">
    <label>NAMA PENGGUNA</label>
    <div class="input-box">
      <span>👤</span>
      <input type="email" id="email" placeholder="Masukkan nama pengguna">
    </div>
  </div>

  <div class="input-group">
    <label>KATA SANDI</label>
    <div class="input-box">
      <span>🔒</span>
      <input type="password" id="password" placeholder="Masukkan password">
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>
  </div>

  <button class="btn" onclick="login()">MASUK</button>

  <div class="footer">Developer by - AJM Project</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCtwOYXtjiWo2BJ9Tp2luwhf7PztEk55HM",
    authDomain: "ajm-control-panel-adba5.firebaseapp.com",
    projectId: "ajm-control-panel-adba5"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // 🔥 AUTO LOGIN
  auth.onAuthStateChanged((user) => {
    if (user) {
      window.location.href = "/dashboard";
    }
  });

  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Harap isi email dan password!");
      return;
    }

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        window.location.href = "/dashboard";
      })
      .catch((error) => {
        if (error.code === "auth/user-not-found") {
          alert("Akun tidak terdaftar!");
        } else if (error.code === "auth/wrong-password") {
          alert("Password salah!");
        } else if (error.code === "auth/invalid-email") {
          alert("Format email tidak valid!");
        } else {
          alert("Login gagal!");
        }
      });
  }

  function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }
</script>

</body>
    </html>
